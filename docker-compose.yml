version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL Database Service
  # ----------------------------------------
  db:
    image: postgres:16-alpine
    container_name: baps_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baps123}
      POSTGRES_DB: ${POSTGRES_DATABASE:-baps_parivar_db}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DATABASE:-baps_parivar_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - baps-network

  # ----------------------------------------
  # Redis Cache Service
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: baps_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - baps-network

  # ----------------------------------------
  # FastAPI Backend Service
  # ----------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baps_api
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - .:/app  # For live reloading during development
    environment:
      # These will override the defaults in core/config.py
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      # Load other variables from .env
    env_file:
      - .env
    networks:
      - baps-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 9000 --reload

networks:
  baps-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
